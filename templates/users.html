<!DOCTYPE html>
<html>
<head>
    <title>Feedback List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }
        h2 {
            text-align: center;
            margin-top: 30px;
        }
        table {
            width: 85%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background: #333;
            color: white;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Feedback List</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Feedback</th>
        <th>Action</th>
    </tr>

    {% for f in users %}
    <tr>
        <td>{{ f.id }}</td>
        <td>{{ f.name }}</td>
        <td>{{ f.email }}</td>
        <td>{{ f.feedback }}</td>
        <td>
            <a href="/delete/{{ f.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
